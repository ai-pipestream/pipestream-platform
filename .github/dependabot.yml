version: 2

registries:
  github-packages:
    type: maven-repository
    url: https://maven.pkg.github.com/ai-pipestream/pipestream-platform
    username: x-access-token
    password: "${{secrets.DEPENDABOT_TOKEN}}"

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  # Single entry for the entire Gradle Monorepo
  - package-ecosystem: "gradle"
    directory: "/"
    registries:
      - github-packages
    schedule:
      interval: "weekly"
    groups:
      gradle-dependencies:
        patterns:
          - "*"
