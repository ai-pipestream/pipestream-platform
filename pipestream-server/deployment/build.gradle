plugins {
    alias(libs.plugins.java.library)
}

description = 'Pipestream Server Defaults Extension - Deployment'

dependencies {
    implementation platform(libs.quarkus.bom)
    implementation 'io.quarkus:quarkus-arc-deployment'
    implementation 'io.quarkus:quarkus-rest-deployment'
    implementation 'io.quarkus:quarkus-vertx-http-deployment'
    implementation 'io.quarkus:quarkus-smallrye-health-deployment'
    implementation 'io.quarkus:quarkus-grpc-deployment'
    implementation 'io.quarkus:quarkus-smallrye-openapi-deployment'
    implementation 'io.quarkus:quarkus-swagger-ui-deployment'
    implementation 'io.quarkus:quarkus-info-deployment'

    implementation project(':pipestream-server')

    annotationProcessor 'io.quarkus:quarkus-extension-processor'

    // Test dependencies — QuarkusUnitTest spins up a self-contained Quarkus
    // app per test class, exactly what we need to validate that build-time
    // bean registration actually wires this extension's CDI beans into
    // consumer apps.
    testImplementation 'io.quarkus:quarkus-junit5-internal'
    testImplementation 'org.junit.jupiter:junit-jupiter-api'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine'
    testImplementation libs.assertj.core
    testImplementation 'io.smallrye.reactive:mutiny'
    testImplementation 'io.quarkus:quarkus-vertx'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
    testLogging {
        events 'passed', 'failed', 'skipped'
    }
}
