version: "0.5"

log_location: ${HOME}/.pipeline/dev/logs/process-compose.log
log_level: info

processes:

  # Brings up the shared infra compose (Consul, Kafka, Apicurio, Postgres, ...).
  # `dev-services up` wraps `docker compose up -d` — it returns once the stack
  # is launched, so we mark is_daemon: true and gate readiness on an actual
  # Consul-leader probe rather than the command's exit code.
  dev-services:
    command: dev-services up
    is_daemon: true
    shutdown:
      command: dev-services down
      timeout_seconds: 30
    readiness_probe:
      exec:
        command: ${HOME}/.pipeline/dev/check-infra-healthy.sh
      initial_delay_seconds: 5
      period_seconds: 3
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 120
    availability:
      restart: "no"

  # Starts a local djl-serving container sized for the detected host
  # (Linux+NVIDIA → GPU, Linux-CPU or other → CPU, macOS stubbed).
  # No dependency on dev-services: djl-serving only needs Docker, and image
  # pulls / model registration run in parallel with infra bring-up.
  dev-djl-serving:
    command: ${HOME}/.pipeline/dev/start-dev-djl.sh
    is_daemon: true
    shutdown:
      command: docker rm -f ${DJL_SERVING_CONTAINER_NAME:-pipeline-djl-serving}
      timeout_seconds: 30
    readiness_probe:
      exec:
        command: ${HOME}/.pipeline/dev/check-djl-healthy.sh
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 120
    availability:
      restart: "no"
    log_location: ${HOME}/.pipeline/dev/logs/dev-djl-serving.log

  # One-shot: register the embedder e2e test models against the running
  # djl-serving. Exits 0 once all configured models are loaded.
  # module-embedder waits for this via process_completed_successfully.
  dev-djl-models:
    command: ${HOME}/.pipeline/dev/register-dev-djl-models.sh
    depends_on:
      dev-djl-serving:
        condition: process_healthy
    availability:
      restart: "no"
    log_location: ${HOME}/.pipeline/dev/logs/dev-djl-models.log

  platform-registration:
    command: quarkus dev
    working_dir: ${CORE_SERVICES_DIR}/platform-registration-service
    depends_on:
      dev-services:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: localhost
        port: ${PLATFORM_REGISTRATION_HTTP_PORT:-18101}
        path: /q/health/ready
      initial_delay_seconds: 15
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 60
    availability:
      restart: on_failure
      max_restarts: 3
    shutdown:
      signal: 15
      timeout_seconds: 30
    log_location: ${HOME}/.pipeline/dev/logs/platform-registration.log

  account-service:
    command: quarkus dev
    working_dir: ${CORE_SERVICES_DIR}/account-service
    depends_on:
      dev-services:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: localhost
        port: ${ACCOUNT_SERVICE_HTTP_PORT:-18105}
        path: /q/health/ready
      initial_delay_seconds: 15
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 60
    availability:
      restart: on_failure
      max_restarts: 3
    shutdown:
      signal: 15
      timeout_seconds: 30
    log_location: ${HOME}/.pipeline/dev/logs/account-service.log

  connector-admin:
    command: quarkus dev
    working_dir: ${CORE_SERVICES_DIR}/connector-admin
    depends_on:
      dev-services:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: localhost
        port: ${CONNECTOR_ADMIN_HTTP_PORT:-18107}
