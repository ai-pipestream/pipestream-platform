name: Build & Test (Per-Project)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Note: Publishing is handled by CI/Snapshot workflow (ci.yml)
# This workflow focuses on detailed per-project testing

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Buf
        uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          setup_only: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and test all modules
        env:
          GRADLE_OPTS: -Xmx2048m -XX:MaxMetaspaceSize=512m
        run: |
          ./gradlew clean build --no-daemon

      - name: Publish Test Report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Test Results
          # Match all modules and parallel test worker dirs (test-results/test, test-results/test-worker-*)
          path: "**/build/test-results/**/*.xml"
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            **/build/test-results/
            **/build/reports/
