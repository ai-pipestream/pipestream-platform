version: 2

registries:
  github-packages:
    type: maven-repository
    url: https://maven.pkg.github.com/ai-pipestream/pipestream-platform
    username: x-access-token
    password: "${{secrets.DEPENDABOT_TOKEN}}"

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  # Single entry for the entire Gradle Monorepo
  - package-ecosystem: "gradle"
    directory: "/"
    registries:
      - github-packages
    schedule:
      interval: "weekly"
    groups:
      gradle-dependencies:
        patterns:
          - "*"
    ignore:
      # Published from this monorepo to GitHub Packages — version is bumped on
      # release, not by Dependabot. Without a valid DEPENDABOT_TOKEN with
      # packages:read, resolution fails with private_source_authentication_failure
      # and marks the whole weekly run as failed (see actions/runs/26564101811).
      - dependency-name: "ai.pipestream:proto-toolchain"
      - dependency-name: "ai.pipestream:quarkus-buf-grpc-generator"
      - dependency-name: "ai.pipestream.proto-toolchain"
