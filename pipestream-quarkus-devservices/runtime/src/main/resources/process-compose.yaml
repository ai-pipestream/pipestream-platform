  # ---- Engine tier: starts once the core business services are healthy ----

  pipestream-engine:
    command: quarkus dev
    working_dir: ${CORE_SERVICES_DIR}/pipestream-engine
    depends_on:
      platform-registration:
        condition: process_healthy
      account-service:
        condition: process_healthy
      connector-admin:
        condition: process_healthy
      repository-service:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: localhost
        port: ${PIPESTREAM_ENGINE_HTTP_PORT:-18100}
